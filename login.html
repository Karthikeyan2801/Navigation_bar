<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   
     <form autocomplete="off" class="form">
        
        <div class="signfrm" >
            <h3>Login</h3>
            
            <div class="label">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter email">
            </div>
            <div class="label">
                <label for="pass">Password</label>
                <input type="password" id="pass" placeholder="Enter Password">
            </div>
            <div class="check">
                <input type="checkbox">
                <label>Show Password</label>
            </div>
            <div class="sign">
                <button>SIGN IN</button>
            </div>
            <div class="redirect">
                <label>Forget <a href="login.html">Username ; password?</a></label><br>
                <label>Don't have an account?<a href="index.html" target="_blank">Sign up</a></label>
            </div>
        </div>
    </form>

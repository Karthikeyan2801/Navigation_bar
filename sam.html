<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be Mine?</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        overflow:hidden;
    }

    .container{
        text-align:center;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        width:450px;
    }

    h1{
        color:#ff4d6d;
        margin-bottom:15px;
    }

    p{
        font-size:18px;
        margin-bottom:30px;
    }

    .buttons{
        position:relative;
        height:120px;
    }

    button{
        padding:12px 30px;
        border:none;
        border-radius:30px;
        font-size:18px;
        cursor:pointer;
        transition:0.3s;
    }

    #yesBtn{
        background:#28a745;
        color:white;
        margin-right:20px;
    }

    #yesBtn:hover{
        transform:scale(1.1);
    }

    #noBtn{
        background:#dc3545;
        color:white;
        position:absolute;
        left:250px;
        top:0;
    }

    .success{
        display:none;
        margin-top:20px;
        font-size:24px;
        color:#ff4d6d;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="container">
    <h1>❤️ Will You Be My Girlfriend? ❤️</h1>
    <p>You are the most special person in my life. Will you say YES?</p>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😅</button>
    </div>

    <div class="success" id="successMsg">
        🎉 Yayy! You made me the happiest person! ❤️
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
        noBtn.style.position = "fixed";
    });

    document.getElementById("yesBtn").addEventListener("click", () => {
        document.getElementById("successMsg").style.display = "block";
    });
</script>

</body>
</html>
